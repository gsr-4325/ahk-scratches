name: AHK IPC stdio fast

on:
  push:
    paths:
      - ".github/workflows/ahk-ipc-stdio-fast.yml"
      - "scripts/tests/stdio/**"
      - "tools/test_stdio_echo_py.py"
  pull_request:
    paths:
      - ".github/workflows/ahk-ipc-stdio-fast.yml"
      - "scripts/tests/stdio/**"
      - "tools/test_stdio_echo_py.py"
  workflow_dispatch:
    inputs:
      ahk_version:
        description: "AutoHotkey v2 release version"
        required: true
        default: "2.0.19"
        type: string
      timeout_seconds:
        description: "Harness timeout in seconds"
        required: true
        default: "8"
        type: string

permissions:
  contents: read

jobs:
  stdio-echo-fast:
    runs-on: windows-latest
    timeout-minutes: 2
    env:
      DEFAULT_AHK_VERSION: 2.0.19
      DEFAULT_TIMEOUT_SECONDS: 8
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve workflow inputs
        id: resolve
        shell: pwsh
        run: |
          $ahkVersion = "${{ github.event.inputs.ahk_version }}"
          if ([string]::IsNullOrWhiteSpace($ahkVersion)) { $ahkVersion = "${{ env.DEFAULT_AHK_VERSION }}" }

          $timeoutSeconds = "${{ github.event.inputs.timeout_seconds }}"
          if ([string]::IsNullOrWhiteSpace($timeoutSeconds)) { $timeoutSeconds = "${{ env.DEFAULT_TIMEOUT_SECONDS }}" }

          "ahk_version=$ahkVersion" >> $env:GITHUB_OUTPUT
          "timeout_seconds=$timeoutSeconds" >> $env:GITHUB_OUTPUT

      - name: Download AutoHotkey v2
        shell: pwsh
        run: |
          $version = "${{ steps.resolve.outputs.ahk_version }}"
          $zipUrl = "https://github.com/AutoHotkey/AutoHotkey/releases/download/v$version/AutoHotkey_$version.zip"
          $zipPath = Join-Path $env:RUNNER_TEMP "AutoHotkey.zip"
          $extractPath = Join-Path $env:RUNNER_TEMP "AutoHotkey"

          Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath
          Expand-Archive -LiteralPath $zipPath -DestinationPath $extractPath -Force

          $ahkExe = Join-Path $extractPath "AutoHotkey64.exe"
          if (-not (Test-Path -LiteralPath $ahkExe)) {
            throw "AutoHotkey64.exe was not found after extracting $zipUrl"
          }

          "AHK_EXE=$ahkExe" >> $env:GITHUB_ENV

      - name: Run stdio echo harness
        shell: pwsh
        env:
          ARTIFACT_DIR: ${{ github.workspace }}\artifacts-ipc-fast
        run: |
          python "${{ github.workspace }}\tools\test_stdio_echo_py.py" --timeout-seconds "${{ steps.resolve.outputs.timeout_seconds }}"

      - name: Show result in log and step summary
        if: always()
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE 'artifacts-ipc-fast'
          $summaryPath = Join-Path $artifactDir 'summary.json'
          $stdoutPath = Join-Path $artifactDir 'stdout-transcript.txt'
          $stderrPath = Join-Path $artifactDir 'stderr.txt'
          $metaPath = Join-Path $artifactDir 'run-metadata.txt'

          foreach ($file in @('summary.json', 'stdout-transcript.txt', 'stderr.txt', 'run-metadata.txt')) {
            $path = Join-Path $artifactDir $file
            Write-Host "--- $file ---"
            if (Test-Path -LiteralPath $path) {
              Get-Content -LiteralPath $path
            }
          }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '## AHK IPC stdio fast'
          if (Test-Path -LiteralPath $summaryPath) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '### summary.json'
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```json'
            Get-Content -LiteralPath $summaryPath | Add-Content -Path $env:GITHUB_STEP_SUMMARY
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'
          }
          if (Test-Path -LiteralPath $stdoutPath) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '### stdout-transcript.txt'
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```text'
            Get-Content -LiteralPath $stdoutPath | Add-Content -Path $env:GITHUB_STEP_SUMMARY
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'
          }
          if (Test-Path -LiteralPath $stderrPath) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '### stderr.txt'
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```text'
            Get-Content -LiteralPath $stderrPath | Add-Content -Path $env:GITHUB_STEP_SUMMARY
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'
          }
          if (Test-Path -LiteralPath $metaPath) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '### run-metadata.txt'
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```text'
            Get-Content -LiteralPath $metaPath | Add-Content -Path $env:GITHUB_STEP_SUMMARY
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'
          }

      - name: Upload IPC artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ahk-ipc-stdio-fast-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts-ipc-fast
          if-no-files-found: warn
          retention-days: 14
