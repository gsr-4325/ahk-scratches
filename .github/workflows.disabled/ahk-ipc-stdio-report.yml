name: AHK IPC stdio report

on:
  push:
    paths:
      - ".github/workflows/ahk-ipc-stdio-report.yml"
      - "scripts/tests/stdio/child_echo_v2.ahk"
      - "tools/test_stdio_echo_py_v2.py"
      - "docs/ci-reporting.md"
  pull_request:
    paths:
      - ".github/workflows/ahk-ipc-stdio-report.yml"
      - "scripts/tests/stdio/child_echo_v2.ahk"
      - "tools/test_stdio_echo_py_v2.py"
      - "docs/ci-reporting.md"
  workflow_dispatch:
    inputs:
      ahk_version:
        description: "AutoHotkey v2 release version"
        required: true
        default: "2.0.19"
        type: string
      timeout_seconds:
        description: "Harness timeout in seconds"
        required: true
        default: "4"
        type: string

permissions:
  contents: write

jobs:
  stdio-echo-report:
    runs-on: windows-latest
    timeout-minutes: 2
    env:
      DEFAULT_AHK_VERSION: 2.0.19
      DEFAULT_TIMEOUT_SECONDS: 4
      REPORT_BRANCH: ci-reports
      REPORT_DIR: reports/ahk-ipc-stdio-fast-v2
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve workflow inputs
        id: resolve
        shell: pwsh
        run: |
          $ahkVersion = "${{ github.event.inputs.ahk_version }}"
          if ([string]::IsNullOrWhiteSpace($ahkVersion)) { $ahkVersion = "${{ env.DEFAULT_AHK_VERSION }}" }

          $timeoutSeconds = "${{ github.event.inputs.timeout_seconds }}"
          if ([string]::IsNullOrWhiteSpace($timeoutSeconds)) { $timeoutSeconds = "${{ env.DEFAULT_TIMEOUT_SECONDS }}" }

          "ahk_version=$ahkVersion" >> $env:GITHUB_OUTPUT
          "timeout_seconds=$timeoutSeconds" >> $env:GITHUB_OUTPUT

      - name: Download AutoHotkey v2
        shell: pwsh
        run: |
          $version = "${{ steps.resolve.outputs.ahk_version }}"
          $zipUrl = "https://github.com/AutoHotkey/AutoHotkey/releases/download/v$version/AutoHotkey_$version.zip"
          $zipPath = Join-Path $env:RUNNER_TEMP "AutoHotkey.zip"
          $extractPath = Join-Path $env:RUNNER_TEMP "AutoHotkey"

          Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath
          Expand-Archive -LiteralPath $zipPath -DestinationPath $extractPath -Force

          $ahkExe = Join-Path $extractPath "AutoHotkey64.exe"
          if (-not (Test-Path -LiteralPath $ahkExe)) {
            throw "AutoHotkey64.exe was not found after extracting $zipUrl"
          }

          "AHK_EXE=$ahkExe" >> $env:GITHUB_ENV

      - name: Run stdio echo harness v2
        shell: pwsh
        env:
          ARTIFACT_DIR: ${{ github.workspace }}\artifacts-ipc-report
        run: |
          python "${{ github.workspace }}\tools\test_stdio_echo_py_v2.py" --timeout-seconds "${{ steps.resolve.outputs.timeout_seconds }}"

      - name: Show result in log and step summary
        if: always()
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE 'artifacts-ipc-report'
          foreach ($file in @('summary.json', 'stdout-transcript.txt', 'stderr.txt', 'run-metadata.txt')) {
            $path = Join-Path $artifactDir $file
            Write-Host "--- $file ---"
            if (Test-Path -LiteralPath $path) {
              Get-Content -LiteralPath $path
            }
          }

      - name: Publish latest report to ci-reports branch
        if: always()
        id: publish
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE 'artifacts-ipc-report'
          $summaryPath = Join-Path $artifactDir 'summary.json'
          $stdoutPath = Join-Path $artifactDir 'stdout-transcript.txt'
          $stderrPath = Join-Path $artifactDir 'stderr.txt'
          $metaPath = Join-Path $artifactDir 'run-metadata.txt'

          $reportCloneDir = Join-Path $env:RUNNER_TEMP 'ci-reports-repo'
          if (Test-Path -LiteralPath $reportCloneDir) {
            Remove-Item -LiteralPath $reportCloneDir -Recurse -Force
          }

          git clone --branch "$env:REPORT_BRANCH" "https://x-access-token:$env:GH_TOKEN@github.com/${{ github.repository }}.git" "$reportCloneDir"
          if ($LASTEXITCODE -ne 0) {
            throw 'Failed to clone ci-reports branch.'
          }

          $destDir = Join-Path $reportCloneDir $env:REPORT_DIR
          New-Item -ItemType Directory -Path $destDir -Force | Out-Null

          $latestJson = Join-Path $destDir 'latest.json'
          $latestMd = Join-Path $destDir 'latest.md'
          $latestTranscript = Join-Path $destDir 'latest-transcript.txt'
          $latestStderr = Join-Path $destDir 'latest-stderr.txt'
          $latestMeta = Join-Path $destDir 'latest-metadata.txt'

          if (Test-Path -LiteralPath $summaryPath) { Copy-Item -LiteralPath $summaryPath -Destination $latestJson -Force }
          if (Test-Path -LiteralPath $stdoutPath) { Copy-Item -LiteralPath $stdoutPath -Destination $latestTranscript -Force }
          if (Test-Path -LiteralPath $stderrPath) { Copy-Item -LiteralPath $stderrPath -Destination $latestStderr -Force }
          if (Test-Path -LiteralPath $metaPath) { Copy-Item -LiteralPath $metaPath -Destination $latestMeta -Force }

          $reportUrl = "https://github.com/${{ github.repository }}/blob/$env:REPORT_BRANCH/$($env:REPORT_DIR)/latest.md"
          $jsonText = if (Test-Path -LiteralPath $summaryPath) { Get-Content -LiteralPath $summaryPath -Raw } else { '{"passed":false,"error":"summary.json missing"}' }
          $stdoutText = if (Test-Path -LiteralPath $stdoutPath) { Get-Content -LiteralPath $stdoutPath -Raw } else { '' }
          $stderrText = if (Test-Path -LiteralPath $stderrPath) { Get-Content -LiteralPath $stderrPath -Raw } else { '' }
          $metaText = if (Test-Path -LiteralPath $metaPath) { Get-Content -LiteralPath $metaPath -Raw } else { '' }

          $lines = @(
            '# AHK IPC stdio latest report',
            '',
            "- workflow: ${{ github.workflow }}",
            "- run id: ${{ github.run_id }}",
            "- run attempt: ${{ github.run_attempt }}",
            "- ref: ${{ github.ref }}",
            "- sha: ${{ github.sha }}",
            '',
            '## summary.json',
            '```json',
            $jsonText.TrimEnd(),
            '```',
            '',
            '## stdout-transcript.txt',
            '```text',
            $stdoutText.TrimEnd(),
            '```',
            '',
            '## stderr.txt',
            '```text',
            $stderrText.TrimEnd(),
            '```',
            '',
            '## run-metadata.txt',
            '```text',
            $metaText.TrimEnd(),
            '```'
          )
          Set-Content -LiteralPath $latestMd -Value ($lines -join "`r`n")

          Set-Location $reportCloneDir
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          $status = git status --short
          if ($status) {
            git commit -m "Update latest AHK IPC report for run ${{ github.run_id }} attempt ${{ github.run_attempt }}"
            if ($LASTEXITCODE -ne 0) { throw 'Failed to commit latest report.' }
            git push origin "$env:REPORT_BRANCH"
            if ($LASTEXITCODE -ne 0) { throw 'Failed to push latest report.' }
          }

          "report_url=$reportUrl" >> $env:GITHUB_OUTPUT

      - name: Add report link to step summary
        if: always()
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '## Published report'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "Latest report: ${{ steps.publish.outputs.report_url }}"

      - name: Upload IPC artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ahk-ipc-stdio-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts-ipc-report
          if-no-files-found: warn
          retention-days: 14
